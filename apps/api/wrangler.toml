name = "studioflow360-api"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain route
workers_dev = true
routes = [
  { pattern = "api.studiomgr360.com/*", zone_name = "studiomgr360.com" }
]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "studioflow360-db"
database_id = "3a15f1ed-f131-4187-b7df-9660ab689d8b"
migrations_dir = "../../migrations"

# KV Namespaces
[[kv_namespaces]]
binding = "SESSION_STORE"
id = "6cb2a4a5f0a542c99652273474e76b44"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "09d54d9bf159421db0c47c38abcd623f"

# Graph API token cache (shared with email-monitor worker)
# Required secrets: AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_MAILBOX_USER_ID
[[kv_namespaces]]
binding = "GRAPH_STATE"
id = "aa1c5de3d6e74ef6b98057b158cddf6b"

# R2 Buckets
[[r2_buckets]]
binding = "EMAIL_ARCHIVE"
bucket_name = "studioflow360-emails"

[[r2_buckets]]
binding = "AVATARS"
bucket_name = "studioflow360-avatars"

# Workers AI
[ai]
binding = "AI"

# Durable Objects
[durable_objects]
bindings = [
  { name = "BOOKING_HUB", class_name = "BookingHub" }
]

[[migrations]]
tag = "v1"
new_classes = ["BookingHub"]

# Environment variables
[vars]
ENVIRONMENT = "production"
TURNSTILE_SITE_KEY = ""

# Acuity Scheduling webhook integration
# Secrets (set via wrangler secret put): ACUITY_USER_ID, ACUITY_API_KEY

# Staging environment
[env.staging]
name = "studioflow360-api-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
